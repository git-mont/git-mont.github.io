Conduct a structured research synthesis following this sequence:

**Section 1 — Executive Summary**
- Key findings across all sources (3–5 bullet points)
- Primary conclusions and recommendations
- Confidence level for each conclusion: 🟢 Strong evidence / 🟡 Moderate evidence / 🔴 Limited evidence
- Critical gaps that limit certainty

**Section 2 — Source Assessment**
For each source, evaluate:
- Type (peer-reviewed, internal report, grey literature, primary data)
- Methodology quality (design, sample size, rigor)
- Potential biases or limitations
- Relevance to the research questions
- Provide an overall source quality summary table

| Source | Type | Quality | Bias Risk | Relevance |
|---|---|---|---|---|
| [Source name] | [Type] | High/Med/Low | [Notes] | High/Med/Low |

**Section 3 — Thematic Analysis**
- Identify major themes that emerge across multiple sources
- For each theme:
  - Which sources support it (with specific evidence)
  - Strength of convergence (how many sources agree)
  - Any dissenting evidence or alternative interpretations
- Map how themes relate to each other (complementary, contradictory, or independent)
- Note how the field's thinking has evolved over time if applicable

**Section 4 — Evidence Integration**
- Quantitative findings: integrate statistics, effect sizes, and metrics across sources. Note where direct comparison is valid vs. where methodological differences limit comparability
- Qualitative findings: identify recurring patterns, illustrative examples, and contextual factors
- Cross-method triangulation: where quantitative and qualitative findings converge or diverge, note this explicitly
- Flag any findings that rest on a single source (not corroborated)

**Section 5 — Critical Analysis**
- Strengths of the available evidence base as a whole
- Limitations and methodological concerns
  - Sample size and representativeness across studies
  - Generalizability constraints (context, population, time)
  - Potential confounding factors
  - Publication bias or selection effects
- Alternative explanations for key findings
- What the evidence does NOT tell us

**Section 6 — Insights & Recommendations**
- Novel connections identified across sources that individual sources didn't surface
- Implications for theory (what this means for how we understand the topic)
- Implications for practice (what this means for what we should do)
- Predictive insights: what trends suggest about future directions
- Prioritized recommendations ranked by evidence strength and feasibility

**Section 7 — Gaps & Future Directions**
- Specific questions the current evidence cannot answer
- Methodological improvements that would strengthen the evidence base
- Emerging hypotheses worth testing
- Recommended next research priorities, ranked

**Section 8 — Practical Application**
- Implementation recommendations with evidence basis for each
- Risk factors and mitigation strategies
- Success factors and best practices from the evidence
- Suggested monitoring and evaluation framework to track outcomes
</task>

<output_format>
**Format options** (specify which you need, or default to Full Report):
- **Full Report:** All 8 sections, detailed analysis (5–15 pages)
- **Executive Brief:** Sections 1, 6, and 7 only (1–2 pages)
- **Presentation Outline:** Key findings as slide-ready bullets with supporting evidence

For all formats:
- Use evidence strength indicators: 🟢 Strong / 🟡 Moderate / 🔴 Limited
- Cite specific sources inline (e.g., "Smith et al., 2023 found...")
- Include summary tables where they aid comprehension
- Quantify wherever possible ("4 of 6 studies found...", "effect sizes ranged from 0.3–0.7")
</output_format>

<constraints>
- Do not fabricate citations, statistics, or findings. Synthesize only what is present in the provided sources.
- Clearly distinguish between: established findings (multiple strong sources), emerging evidence (limited but promising sources), and speculation (logical inference beyond what sources directly state).
- Do not over-weight any single source. If one study dominates the synthesis, flag this as a limitation.
- If sources use different methodologies, populations, or definitions, note these differences before comparing findings.
- Maintain analytical neutrality — present the evidence as it is, not as you think the user wants it to be.
- If the sources provided are insufficient to answer a key research question, say so directly rather than stretching the evidence.
- Flag any potential conflicts of interest in source materials (industry-funded studies, internal reports, advocacy research).
</constraints>`,

'thinking-partner':`<role>
YOU ARE MY ELITE THINKING PARTNER AND INTELLECTUAL SPARRING COMPANION. Your job is NOT to answer my questions — it's to UPGRADE MY THINKING. Challenge my ideas, sharpen my reasoning, surface what I'm missing, and help me arrive at better conclusions than I could alone.

We are not just solving problems. WE ARE CO-CREATING BREAKTHROUGHS.
</role>

<principles>

**HOW YOU ENGAGE:**
- ASK SHARP, PROBING QUESTIONS to clarify assumptions and expose deeper layers of reasoning before offering any perspective
- OFFER SECOND-ORDER THINKING — don't stop at "what happens next," push to "what happens AFTER what happens next"
- CHALLENGE WEAK ARGUMENTS respectfully but directly. Point out logical flaws, gaps in reasoning, and overlooked implications. Don't let bad logic slide.
- STRESS-TEST IDEAS by playing devil's advocate, offering alternative perspectives, and simulating the strongest objections
- BRING CROSS-DOMAIN INSIGHTS from psychology, behavioral economics, philosophy, systems thinking, product strategy, organizational dynamics — whatever lens illuminates the problem best

**HOW YOU COMMUNICATE:**
- DON'T DEFAULT TO AGREEMENT — push the conversation forward through curiosity and depth
- TREAT ME AS A CAPABLE STRATEGIST — I don't need hand-holding, I need a partner who engages deeply with my goals and context
- BE CLEAR, CONCISE, AND PRAGMATIC — but never shallow
- ASK CLARIFYING QUESTIONS before jumping to solutions
- FRAME OUTPUT AROUND STRUCTURED THINKING: mental models, trade-offs, first-principles reasoning, decision frameworks
- SPEAK WITH NUANCE but always aim for clarity

</principles>

<operating_sequence>

1. **LISTEN & DECONSTRUCT** — Before responding substantively, identify what the user is actually trying to decide, solve, or understand. Name it back to them.
2. **PROBE** — Ask 1–3 targeted questions that expose assumptions, missing context, or unstated priorities.
3. **REFRAME** — Offer an alternative way to look at the problem that the user likely hasn't considered.
4. **CHALLENGE** — Present the strongest counterargument or devil's advocate position.
5. **SYNTHESIZE** — Help the user integrate the new perspective with their original thinking. Don't tell them what to decide — help them decide better.

</operating_sequence>

<constraints>
- NEVER default to agreement. If the user's reasoning is solid, say so and explain WHY it's solid — then push further.
- NEVER give advice without first understanding the full context. Premature solutions are worse than no solutions.
- NEVER be shallow. Every response should leave the user thinking harder than before.
- ALWAYS ask at least one question that the user hasn't thought to ask themselves.
- ALWAYS make your reasoning transparent — show your thinking, don't just state conclusions.
- If a problem spans multiple domains, NAME the domains you're drawing from so the user can follow your cross-disciplinary reasoning.
</constraints>`,

function startTyping(){
  const phrases=['for research.','for productivity.','for communication.','for strategic thinking.','for getting things done.'];
  const el=document.getElementById('typed-text');
  if(!el)return;
  let pi=0,ci=0,deleting=false;
  function tick(){
    const phrase=phrases[pi];
    if(!deleting){
      el.textContent=phrase.slice(0,ci+1);ci++;
      if(ci===phrase.length){setTimeout(()=>{deleting=true;tick()},1800);return;}
    }else{
      el.textContent=phrase.slice(0,ci-1);ci--;
      if(ci===0){deleting=false;pi=(pi+1)%phrases.length;}
    }
    setTimeout(tick,deleting?30:60);
  }
  tick();
}

/* ─── ChatGPT Format Conversion ───────────────────────────────── */
function xmlToMarkdown(raw){
  if(!raw)return raw;
  let t=raw;
  // Convert XML tags to markdown headers
  t=t.replace(/<(role|context|task|constraints|output_format|framework_library)>/gi,(m,tag)=>{
    const label=tag.charAt(0).toUpperCase()+tag.slice(1).replace(/_/g,' ');
    return'\n## '+label+'\n';
  });
  t=t.replace(/<\/(role|context|task|constraints|output_format|framework_library)>/gi,'');
  // Clean up extra blank lines
  t=t.replace(/\n{3,}/g,'\n\n').trim();
  return t;
}
function getPromptText(id,format){
  const saved=JSON.parse(localStorage.getItem('prompt-edits')||'{}');
  const edits=saved[id]||{};
  const raw=edits.full||FULL_PROMPTS[id]||'';
  if(!raw)return'';
  return format==='claude'?raw:xmlToMarkdown(raw);
}
let currentFormat='chatgpt'; // default to chatgpt format

function toggleFormat(id){
  const btn=document.getElementById('format-toggle');
  const codeBlock=document.getElementById('detail-code-block');
  if(!btn||!codeBlock)return;
  if(currentFormat==='chatgpt'){
    currentFormat='claude';
    btn.textContent='view chatgpt format';btn.classList.add('active');
    if(customizerActive){renderCustomizerCode();}
    else{codeBlock.innerHTML=highlightSyntax(getPromptText(id,'claude'));}
  }else{
    currentFormat='chatgpt';
    btn.textContent='view claude format';btn.classList.remove('active');
    if(customizerActive){renderCustomizerCode();}
    else{codeBlock.innerHTML=highlightSyntax(getPromptText(id,'chatgpt'));}
  }
}

          <span style="width:4px;height:4px;border-radius:50%;background:${catColor}"></span>
          minimized
        </span>
        <button class="mini-window-expand">expand \u2197</button>
      </div>`;
    document.body.appendChild(win);
    miniWindows.push({id:p.id,el:win});
    /* hover shows dot icons */
    const controls=win.querySelector('.window-controls');
    controls.addEventListener('mouseenter',()=>{
      controls.querySelectorAll('.dot-icon').forEach(d=>d.style.color='rgba(0,0,0,.5)');
    });
    controls.addEventListener('mouseleave',()=>{
      controls.querySelectorAll('.dot-icon').forEach(d=>d.style.color='transparent');
    });
    /* red = dismiss */
    win.querySelector('.window-dot.red').addEventListener('click',e=>{
      e.stopPropagation();
      win.style.opacity='0';win.style.transform='scale(.9) translateY(10px)';
      win.style.transition='all .25s ease';
      setTimeout(()=>{win.remove();miniWindows=miniWindows.filter(w=>w.id!==p.id);},250);
    });
    /* yellow = restore to full view */
    win.querySelector('.window-dot.yellow').addEventListener('click',e=>{
      e.stopPropagation();
      win.remove();miniWindows=miniWindows.filter(w=>w.id!==p.id);
      openPrompt(p.id);
    });
    /* click body or expand = restore */
    const restoreFn=()=>{
      win.remove();miniWindows=miniWindows.filter(w=>w.id!==p.id);
      openPrompt(p.id);
    };
    win.querySelector('.mini-window-body').addEventListener('click',restoreFn);
    win.querySelector('.mini-window-expand').addEventListener('click',e=>{e.stopPropagation();restoreFn();});
    /* drag support */
    let isDragging=false,dragX,dragY,startX,startY;
    const titlebar=win.querySelector('.mini-window-titlebar');
    titlebar.addEventListener('mousedown',e=>{
      if(e.target.closest('.window-dot'))return;
      isDragging=true;
      dragX=e.clientX;dragY=e.clientY;
      const rect=win.getBoundingClientRect();
      startX=rect.left;startY=rect.top;
      win.style.right='auto';win.style.bottom='auto';
      win.style.left=startX+'px';win.style.top=startY+'px';
      win.style.zIndex=miniWindowZCounter++;
      e.preventDefault();
    });
    document.addEventListener('mousemove',e=>{
      if(!isDragging)return;
      const dx=e.clientX-dragX;const dy=e.clientY-dragY;
      win.style.left=(startX+dx)+'px';win.style.top=(startY+dy)+'px';
    });
    document.addEventListener('mouseup',()=>{isDragging=false;});
  },320);
}

/* ─── Syntax Highlighting ──────────────────────────────────────── */
function highlightSyntax(raw){
  if(!raw)return'';
  let t=raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // xml tags: <role>, </role>, <context>, etc.
  t=t.replace(/(&lt;\/?[\w_-]+&gt;)/g,'<span class="tag">$1</span>');
  // {{variables}}
  t=t.replace(/(\{\{[\w_ .\-\/|…]+\}\})/g,'<span class="variable">$1</span>');
  // keywords (standalone, case-insensitive)
  t=t.replace(/\b(MUST|NEVER|ALWAYS|IMPORTANT|NOTE|WAIT|STOP|CRITICAL|DO NOT|IF|THEN|ONLY)\b/g,'<span class="keyword">$1</span>');
  // **bold text** as strings
  t=t.replace(/\*\*([^*]+)\*\*/g,'<span class="string">**$1**</span>');
  // section headers (## lines)
  t=t.replace(/^(#{1,4}\s.+)$/gm,'<span class="keyword">$1</span>');
  // operators: |, →, —, =, :
  t=t.replace(/(→|—)/g,'<span class="operator">$1</span>');
  return t;
}

/* ─── Ambient Particles ──────────────────────────────────────── */
(function(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.15';
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  let w,h,particles=[];
  function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<30;i++){
    particles.push({x:Math.random()*w,y:Math.random()*h,
      vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15,
      r:Math.random()*1.5+.5,o:Math.random()*.3+.1});
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(10,132,255,${p.o})`;ctx.fill();
    });
    /* draw lines between nearby particles */
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x;
        const dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(10,132,255,${.04*(1-dist/120)})`;
          ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ─── Prompt Customizer — Inline Interactive Mode ────────────── */
let customizerActive=false;
let customizerData=null; /* {promptId, vars, values} */

function parseVarLabel(rawLabel){
  /* Split label from embedded example: "RESEARCH_PERIOD — e.g., ..." or "option1 / option2 / option3" */
  let label=rawLabel;
  let example='';
  /* extract e.g. example */
  const egMatch=rawLabel.match(/^(.+?)\s*[—–-]\s*e\.g\.\s*[,:]?\s*(.+)$/i);
  if(egMatch){
    label=egMatch[1].trim();
    example=egMatch[2].trim().replace(/^[""]|[""]$/g,'');
  }else{
    /* check if starts with e.g. */
    const egMatch2=rawLabel.match(/^e\.g\.\s*[,:]?\s*(.+)$/i);
    if(egMatch2){label='example';example=egMatch2[1].trim().replace(/^[""]|[""]$/g,'');}
  }
  /* clean up SCREAMING_SNAKE to readable */
  label=label.replace(/_/g,' ').replace(/\b([A-Z]{2,})\b/g,(m)=>m.toLowerCase());
  return{label,example};
}

function extractVariables(promptText){
  const vars=[];const seen=new Set();
  /* 1. Extract {{variables}} */
  const varRegex=/\{\{([^}]+)\}\}/g;
  let m;
  while((m=varRegex.exec(promptText))!==null){
    const rawLabel=m[1].trim();
    const key=rawLabel.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
    if(!seen.has(key)){
      seen.add(key);
      const parsed=parseVarLabel(rawLabel);
      const isLarge=rawLabel.toLowerCase().includes('paste')||rawLabel.toLowerCase().includes('notes')||
        rawLabel.toLowerCase().includes('transcript')||rawLabel.toLowerCase().includes('context')||
        rawLabel.toLowerCase().includes('description')||rawLabel.length>60;
      vars.push({key,label:parsed.label,example:parsed.example,original:m[0],
        index:vars.length,type:'var',isLarge,commentBlock:''});
    }
  }
  /* 2. Find <!-- comment blocks --> and attach them to the nearest preceding {{variable}} */
  /* Match consecutive runs of <!-- ... --> lines that follow a {{var}} */
  const commentBlockRegex=/(\{\{[^}]+\}\})\s*\n((?:\s*<!--[^>]*-->\s*\n?)+)/g;
  while((m=commentBlockRegex.exec(promptText))!==null){
    const varOriginal=m[1];
    const commentLines=m[2];
    /* find the var this belongs to */
    const parentVar=vars.find(v=>v.original===varOriginal);
    if(parentVar){
      /* extract text from all comment lines */
      const commentText=commentLines.replace(/<!--\s*/g,'').replace(/\s*-->/g,'').replace(/\s+/g,' ').trim();
      /* parse out the "Replace with..." instruction and "Example:" content */
      let guide=commentText;
      const exMatch=guide.match(/Example:\s*(.+)/i);
      if(exMatch){
        parentVar.example=parentVar.example||exMatch[1].trim();
      }
      /* store the full comment block for removal from display */
      parentVar.commentBlock=commentLines.trim();
      /* if the field has a comment guide, it's likely a large input */
      parentVar.isLarge=true;
    }
  }
  /* 3. Also find standalone comment blocks not attached to a {{var}} */
  const standaloneRegex=/(?<!\}\}\s*\n)\s*(<!--\s*Replace with[^>]*-->(?:\s*\n\s*<!--[^>]*-->)*)/g;
  while((m=standaloneRegex.exec(promptText))!==null){
    /* check this wasn't already captured as part of a var's comment block */
    const alreadyCaptured=vars.some(v=>v.commentBlock&&promptText.indexOf(v.commentBlock)===promptText.indexOf(m[1]));
    if(!alreadyCaptured){
      const commentText=m[1].replace(/<!--\s*/g,'').replace(/\s*-->/g,'').replace(/\s+/g,' ').trim();
      const key='comment_'+vars.length;
      let example='';let label='replace this section';
      const exMatch2=commentText.match(/Example:\s*(.+)/i);
      if(exMatch2)example=exMatch2[1].trim();
      const replMatch=commentText.match(/Replace with\s+(?:your\s+)?(?:specific\s+)?(.+?)(?:\.\s*Example|$)/i);
      if(replMatch)label=replMatch[1].trim().toLowerCase();
      vars.push({key,label,example,original:m[1],index:vars.length,type:'comment',isLarge:true,commentBlock:''});
    }
  }
  return vars;
}

function getVariableHint(v){
  /* if the variable has an embedded example, use that */
  if(v.example)return v.example;
  const l=v.label.toLowerCase();
  if(l.includes('topic')||l.includes('project'))return'your topic or project name';
  if(l.includes('audience'))return'who will read this?';
  if(l.includes('outcome'))return'what result do you need?';
  if(l.includes('date'))return'date, time, duration';
  if(l.includes('name'))return'person or project name';
  if(l.includes('context')||l.includes('platform'))return'describe the relevant context';
  if(l.includes('workflow'))return'describe the steps';
  if(l.includes('question'))return'your specific question';
  if(l.includes('format'))return'desired output format';
  if(l.includes('constraint')||l.includes('non-negot'))return'hard requirements or limits';
  if(l.includes('type'))return'select or describe';
  if(l.includes('purpose'))return'what is this for?';
  if(l.includes('scope'))return'breadth and depth needed';
  if(l.includes('paste')||l.includes('notes')||l.includes('transcript'))return'paste your content here';
  if(l.includes('task')||l.includes('action'))return'the specific task';
  if(l.includes('tension')||l.includes('disagree'))return'areas of conflict in the data';
  if(v.type==='comment')return'replace with your specific details';
  return'enter your details';
}

function openCustomizer(promptId){
  const p=prompts.find(x=>x.id===promptId);if(!p)return;
  const codeBlock=document.getElementById('detail-code-block');
  if(!codeBlock)return;
  const saved=JSON.parse(localStorage.getItem('prompt-edits')||'{}');
  const edits=saved[p.id]||{};
  const raw=edits.full||FULL_PROMPTS[p.id]||'';
  if(!raw){showToast('no prompt template available.','warning');return;}
  const vars=extractVariables(raw);
  if(!vars.length){showToast('this prompt has no fillable fields.','info');return;}

  /* toggle off */
  if(customizerActive&&customizerData&&customizerData.promptId===p.id){
    deactivateCustomizer();return;
  }

  customizerActive=true;
  customizerData={promptId:p.id,vars,raw};

  /* toggle button state */
  const toggleBtn=document.querySelector('.customizer-toggle');
  if(toggleBtn)toggleBtn.classList.add('active');

  /* make code block editable */
  const cb=document.getElementById('detail-code-block');
  if(cb){cb.setAttribute('contenteditable','true');cb.classList.add('editable');}

  /* render the code block with highlighted guide slots */
  renderCustomizerCode();

  /* add the sticky bottom bar */
  renderCustomizerBar();

  showToast('customize mode — edit directly, hover highlights for hints','info');
}

function deactivateCustomizer(){
  customizerActive=false;
  /* restore normal code block */
  const codeBlock=document.getElementById('detail-code-block');
  if(codeBlock){
    codeBlock.removeAttribute('contenteditable');
    codeBlock.classList.remove('editable');
    if(customizerData){
      const displayText=currentFormat==='claude'?customizerData.raw:xmlToMarkdown(customizerData.raw);
      codeBlock.innerHTML=highlightSyntax(displayText);
    }
  }
  customizerData=null;
  /* remove bar */
  document.querySelectorAll('.customizer-bar').forEach(b=>b.remove());
  /* toggle button state */
  const toggleBtn=document.querySelector('.customizer-toggle');
  if(toggleBtn)toggleBtn.classList.remove('active');
}

function renderCustomizerCode(){
  const codeBlock=document.getElementById('detail-code-block');
  if(!codeBlock||!customizerData)return;
  const{vars,raw}=customizerData;
  let text=currentFormat==='claude'?raw:xmlToMarkdown(raw);
  /* remove comment blocks attached to variables (shown as hover hints instead) */
  vars.filter(v=>v.commentBlock).forEach(v=>{
    text=text.replace(v.commentBlock,'');
  });
  /* escape HTML */
  text=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  /* replace standalone comment blocks with highlighted guide spans */
  vars.filter(v=>v.type==='comment').forEach((v)=>{
    const escaped=v.original.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const escapedRegex=escaped.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const hint=(v.example||getVariableHint(v)).replace(/"/g,'&quot;');
    text=text.replace(new RegExp(escapedRegex,'g'),
      `<span class="var-slot empty" data-hint="${hint}">${v.label}</span>`);
  });
  /* replace {{vars}} with highlighted guide spans */
  vars.filter(v=>v.type==='var').forEach((v)=>{
    const escaped=v.original.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const escapedRegex=escaped.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const displayLabel=v.label.replace(/_/g,' ');
    const hint=(v.example||getVariableHint(v)).replace(/"/g,'&quot;');
    text=text.replace(new RegExp(escapedRegex,'g'),
      `<span class="var-slot empty" data-hint="${hint}">${displayLabel}</span>`);
  });
  /* apply syntax highlighting (protect slot spans) */
  text=text.replace(/(&lt;\/?[\w_-]+&gt;)(?![^<]*<\/span>)/g,'<span class="tag">$1</span>');
  text=text.replace(/(\*\*([^*]+)\*\*)(?![^<]*<\/span>)/g,'<span class="string">$1</span>');
  text=text.replace(/\b(MUST|NEVER|ALWAYS|IMPORTANT|NOTE|WAIT|STOP|CRITICAL|DO NOT|IF|THEN|ONLY)\b(?![^<]*<\/span>)/g,'<span class="keyword">$1</span>');
  text=text.replace(/(→|—)(?![^<]*<\/span>)/g,'<span class="operator">$1</span>');
  codeBlock.innerHTML=text;
  /* wire up slot interactions: click selects text, hover shows hint tooltip */
  codeBlock.querySelectorAll('.var-slot').forEach(slot=>{
    slot.addEventListener('click',e=>{
      /* select the slot text so user can type over it */
      const range=document.createRange();
      range.selectNodeContents(slot);
      const sel=window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
    slot.addEventListener('mouseenter',()=>{
      const hint=slot.dataset.hint;
      if(!hint)return;
      const tip=document.createElement('span');
      tip.className='var-hint-tip';
      tip.textContent=hint;
      slot.style.position='relative';
      slot.appendChild(tip);
    });
    slot.addEventListener('mouseleave',()=>{
      slot.querySelectorAll('.var-hint-tip').forEach(t=>t.remove());
    });
  });
}


function getCustomizedText(){
  if(!customizerData)return'';
  /* grab directly from the editable code block — includes both slot values and free edits */
  const codeBlock=document.getElementById('detail-code-block');
  if(codeBlock&&codeBlock.getAttribute('contenteditable')==='true'){
    return codeBlock.innerText;
  }
  /* fallback: build from stored values */
  let text=currentFormat==='claude'?customizerData.raw:xmlToMarkdown(customizerData.raw);
  customizerData.vars.filter(v=>v.commentBlock).forEach(v=>{
    text=text.replace(v.commentBlock,'');
  });
  customizerData.vars.filter(v=>v.type==='comment').forEach(v=>{
    const val=customizerData.values[v.key];
    if(val){
      const escaped=v.original.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      text=text.replace(new RegExp(escaped,'g'),val);
    }
  });
  customizerData.vars.filter(v=>v.type==='var').forEach(v=>{
    const val=customizerData.values[v.key];
    if(val){
      const escaped=v.original.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      text=text.replace(new RegExp(escaped,'g'),val);
    }
  });
  text=text.replace(/\n{3,}/g,'\n\n');
  return text;
}

function renderCustomizerBar(){
  document.querySelectorAll('.customizer-bar').forEach(b=>b.remove());
  if(!customizerData)return;

  const bar=document.createElement('div');
  bar.className='customizer-bar';
  bar.innerHTML=`
    <span class="customizer-bar-label">editing mode — click highlights or type anywhere</span>
    <div class="customizer-bar-actions">
      <button class="customizer-bar-btn customizer-bar-reset" title="Reset to original">\u21bb reset</button>
      <button class="customizer-bar-btn customizer-bar-chatgpt">chatgpt \u2197</button>
      <button class="customizer-bar-btn customizer-bar-copy">copy</button>
      <button class="customizer-bar-btn customizer-bar-exit">\u2715 exit</button>
    </div>`;
  const detail=document.getElementById('prompt-detail');
  if(detail)detail.appendChild(bar);

  bar.querySelector('.customizer-bar-copy').addEventListener('click',function(){
    const text=getCustomizedText();
    navigator.clipboard.writeText(text).then(()=>{
      this.classList.add('copied');this.textContent='\u2714 copied!';
      showToast('prompt copied!','success');
      setTimeout(()=>{this.classList.remove('copied');this.textContent='copy';},2000);
    });
  });
  bar.querySelector('.customizer-bar-chatgpt').addEventListener('click',()=>{
    const text=getCustomizedText();
    window.open('https://chatgpt.com/?q='+encodeURIComponent(text),'_blank');
  });
  bar.querySelector('.customizer-bar-reset').addEventListener('click',()=>{
    renderCustomizerCode();
    showToast('reset to original template.','info');
  });
  bar.querySelector('.customizer-bar-exit').addEventListener('click',()=>{
    deactivateCustomizer();
    showToast('exited customize mode.','info');
  });
}
</script>
